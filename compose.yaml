services:
  postgres:
    image: postgres:16-alpine
    container_name: multimedia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multimedia_app}
      POSTGRES_USER: ${POSTGRES_USER:-g4stly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env before starting PostgreSQL}
    ports:
      - "5432:5432"
    volumes:
      - multimedia_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  multimedia_postgres_data:
